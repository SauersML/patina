[package]
name = "patina"
version = "0.1.0"
edition = "2021"

[dependencies]
cpal = "0.15.2"
anyhow = "1.0"
eframe = "0.22.0"
crossterm = "0.25"
parking_lot = "0.12.1"
dasp_sample = "0.11"
egui = "0.21.0"
rand = "0.8.5"
num-complex = "0.4.3"
reverb = "1.0.47"
midir = "0.10.1"
midly = "0.5.3"
crossbeam-channel = "0.5.14"

# The tape engine runs 8x-oversampled hysteresis; keep debug builds realtime
[profile.dev]
opt-level = 2
