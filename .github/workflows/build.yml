name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test suite (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo check --no-default-features --features plugin

  bundle:
    name: Bundle plugins (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            # Universal binary: Apple Silicon + Intel in one bundle
            bundle: >-
              rustup target add x86_64-apple-darwin aarch64-apple-darwin &&
              cargo xtask bundle-universal patina --release --no-default-features --features plugin
          - name: windows
            os: windows-latest
            bundle: cargo xtask bundle patina --release --no-default-features --features plugin
          - name: linux
            os: ubuntu-latest
            bundle: cargo xtask bundle patina --release --no-default-features --features plugin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Bundle
        run: ${{ matrix.bundle }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: patina-${{ matrix.name }}
          path: |
            target/bundled/Patina.clap
            target/bundled/Patina.vst3

  release:
    name: Attach bundles to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Zip per platform
        run: |
          cd artifacts
          for dir in patina-*; do
            (cd "$dir" && zip -r "../$dir.zip" .)
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
